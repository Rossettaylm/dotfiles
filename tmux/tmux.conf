# ============================================================
# tmux.conf — 基于 Zellij 快捷键配置复刻
# ============================================================
#
# 映射策略:
#   Zellij locked mode  → tmux root table (Alt 快捷键, 无需 prefix)
#   Zellij Ctrl-g 切换  → tmux prefix (Ctrl-\\)
#   Zellij sub-modes    → tmux custom key tables:
#     prefix + p → pane_mode     (面板操作)
#     prefix + t → tab_mode      (窗口/标签操作)
#     prefix + r → resize_mode   (大小调整)
#     prefix + m → move_mode     (移动面板)
#     prefix + s → copy-mode     (滚动/搜索)
#     prefix + o → session_mode  (会话管理)
#
# ============================================================


# ─── 基础设置 ──────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g repeat-time 800
set -g focus-events on
set -g detach-on-destroy on
setw -g mode-keys vi
set -g status-keys vi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# MRU 面板追踪 (fzf pane switcher 依赖)
set-hook -g pane-focus-in "run -b 'bash ~/.config/tmux/scripts/fzf_panes.tmux update_mru_pane_ids'"


# ─── Prefix: Ctrl-k ──────────────────────────────────────────

unbind C-b
set -g prefix C-k
bind C-k send-prefix


# ============================================================
# 全局 Alt 快捷键 (无需 prefix, 对应 zellij locked 模式)
# ============================================================

# 面板导航: Alt + h/j/k/l  |  Alt + 方向键
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# 面板大小调整: Alt + Shift + h/j/k/l  |  Alt + Shift + 方向键
bind -n M-H resize-pane -L 2
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 2
bind -n M-S-Left  resize-pane -L 2
bind -n M-S-Down  resize-pane -D 2
bind -n M-S-Up    resize-pane -U 2
bind -n M-S-Right resize-pane -R 2

# Zoom: Alt + = (放大/还原)
bind -n M-= resize-pane -Z

# 窗口切换: Alt + 9/0 (M-[ 与 CSI 引导序列冲突，会导致 yazi 等终端程序的 DSR 响应被截获)
bind -n M-9 previous-window
bind -n M-0 next-window

# 新建窗口: Alt + t (对应 zellij NewTab)
bind -n M-t new-window -c "#{pane_current_path}"

# 面板分割: Alt + / (左右) / Alt + - (上下)
bind -n M-/ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# Detach: Alt + d
bind -n M-d detach-client

# 重命名窗口: Alt + r (对应 zellij renametab)
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# 跳转窗口: Alt + 1-6 (对应 zellij GoToTab)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6

# 移动窗口顺序: Alt + i / o (对应 zellij MoveTab)
bind -n M-i { swap-window -t -1; select-window -t -1 }
bind -n M-o { swap-window -t +1; select-window -t +1 }

# 会话管理器: Alt + w (sessionx, fzf 驱动)
bind -n M-w run-shell '~/.config/tmux/plugins/tmux-sessionx/scripts/sessionx.sh'

# 面板切换: Alt + e (fzf pane switcher, MRU 排序)
bind -n M-e new-window "bash ~/.config/tmux/scripts/fzf_panes.tmux do_action"

# 浮动弹窗: Alt + f (toggle, 需要 tmux 3.3+)
bind -n M-f if-shell -F '#{==:#{session_name},scratch}' { detach-client } { display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux new-session -A -s scratch" }


# ============================================================
# Prefix 子模式 (自动生成，来源: which-key-config.yaml)
# 运行 python3 ~/.config/tmux/scripts/gen_keybinds.py 重新生成
# ============================================================

source-file ~/.config/tmux/keybinds_generated.conf

# ─── Copy/Scroll 模式 (vi 定制，不在 yaml 中管理) ───────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel


# ─── TPM 插件 ─────────────────────────────────────────────────

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

# ─── Catppuccin 主题配置 ─────────────────────────────────────

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_status_background 'none'

# ─── Pane Border ─────────────────────────────────────────────

set -g pane-border-lines single
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#89b4fa"

set -g status-position bottom


# ─── Resurrect + Continuum ────────────────────────────────────

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ─── Sessionx ────────────────────────────────────────────────

set -g @sessionx-window-height '90%'
set -g @sessionx-window-width '90%'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '80%'
set -g @sessionx-layout 'reverse'
set -g @sessionx-additional-options "--color pointer:9,spinner:92,marker:46"


# ─── TPM 初始化 (保持在文件最末尾) ────────────────────────────

run '~/.config/thirdparty/tpm/tpm'

# ─── Status Bar (catppuccin modules, 需在 TPM 加载后设置) ─────

set -g status-left "#{E:@catppuccin_status_session}"
set -g status-left-length 50
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text " %H:%M"
