# ============================================================
# tmux.conf — 基于 Zellij 快捷键配置复刻
# ============================================================
#
# 映射策略:
#   Zellij locked mode  → tmux root table (Alt 快捷键, 无需 prefix)
#   Zellij Ctrl-g 切换  → tmux prefix (Ctrl-g)
#   Zellij sub-modes    → tmux custom key tables:
#     prefix + p → pane_mode     (面板操作)
#     prefix + t → tab_mode      (窗口/标签操作)
#     prefix + r → resize_mode   (大小调整)
#     prefix + m → move_mode     (移动面板)
#     prefix + s → copy-mode     (滚动/搜索)
#     prefix + o → session_mode  (会话管理)
#
# ============================================================


# ─── 基础设置 ──────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g repeat-time 800
set -g focus-events on
set -g detach-on-destroy on
setw -g mode-keys vi
set -g status-keys vi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM


# ─── Prefix: Ctrl-g (对应 zellij Ctrl-g 模式切换) ─────────

unbind C-b
set -g prefix C-g
bind C-g send-prefix


# ============================================================
# 全局 Alt 快捷键 (无需 prefix, 对应 zellij locked 模式)
# ============================================================

# 面板导航: Alt + h/j/k/l  |  Alt + 方向键
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# 面板大小调整: Alt + Shift + h/j/k/l  |  Alt + Shift + 方向键
bind -n M-H resize-pane -L 2
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 2
bind -n M-S-Left  resize-pane -L 2
bind -n M-S-Down  resize-pane -D 2
bind -n M-S-Up    resize-pane -U 2
bind -n M-S-Right resize-pane -R 2

# 大小调整: Alt + = (放大zoom) / Alt + - (缩小zoom还原)
bind -n M-= resize-pane -Z
bind -n M-- resize-pane -Z

# 窗口切换: Alt + 9/0 (M-[ 与 CSI 引导序列冲突，会导致 yazi 等终端程序的 DSR 响应被截获)
bind -n M-9 previous-window
bind -n M-0 next-window

# 新建窗口: Alt + t (对应 zellij NewTab)
bind -n M-t new-window -c "#{pane_current_path}"

# 新建面板: Alt + p (对应 zellij NewPane)
bind -n M-p split-window -h -c "#{pane_current_path}"

# Detach: Alt + d
bind -n M-d detach-client

# 重命名窗口: Alt + r (对应 zellij renametab)
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# 跳转窗口: Alt + 1-6 (对应 zellij GoToTab)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6

# 移动窗口顺序: Alt + i / o (对应 zellij MoveTab)
bind -n M-i { swap-window -t -1; select-window -t -1 }
bind -n M-o { swap-window -t +1; select-window -t +1 }

# 会话管理器: Alt + w (对应 zellij session-manager)
bind -n M-w choose-tree -Zs

# 浮动弹窗: Alt + f (模拟 zellij ToggleFloatingPanes, 需要 tmux 3.3+)
bind -n M-f popup -d "#{pane_current_path}" -w 80% -h 80% -E


# ============================================================
# Prefix 子模式 (Ctrl-g 后按键, 对应 zellij 从 normal 进入子模式)
# ============================================================

# 进入子模式
bind p switch-client -T pane_mode
bind t switch-client -T tab_mode
bind r switch-client -T resize_mode
bind m switch-client -T move_mode
bind s copy-mode
bind o switch-client -T session_mode


# ─── Pane 模式 (prefix + p → ...) ─────────────────────────
# 对应 zellij: Ctrl-g → p → 操作键

bind -T pane_mode h select-pane -L
bind -T pane_mode j select-pane -D
bind -T pane_mode k select-pane -U
bind -T pane_mode l select-pane -R
bind -T pane_mode d split-window -v -c "#{pane_current_path}"
bind -T pane_mode r split-window -h -c "#{pane_current_path}"
bind -T pane_mode n split-window -c "#{pane_current_path}"
bind -T pane_mode x kill-pane
bind -T pane_mode f resize-pane -Z
bind -T pane_mode w popup -d "#{pane_current_path}" -w 80% -h 80% -E
bind -T pane_mode c command-prompt -I "#T" "select-pane -T '%%'"
bind -T pane_mode Tab select-pane -t :.+


# ─── Tab/Window 模式 (prefix + t → ...) ───────────────────
# 对应 zellij: Ctrl-g → t → 操作键

bind -T tab_mode h previous-window
bind -T tab_mode j next-window
bind -T tab_mode k previous-window
bind -T tab_mode l next-window
bind -T tab_mode n new-window -c "#{pane_current_path}"
bind -T tab_mode x confirm-before -p "kill window #W? (y/n)" kill-window
bind -T tab_mode r command-prompt -I "#W" "rename-window '%%'"
bind -T tab_mode b break-pane
bind -T tab_mode 1 select-window -t 1
bind -T tab_mode 2 select-window -t 2
bind -T tab_mode 3 select-window -t 3
bind -T tab_mode 4 select-window -t 4
bind -T tab_mode 5 select-window -t 5
bind -T tab_mode 6 select-window -t 6
bind -T tab_mode 7 select-window -t 7
bind -T tab_mode 8 select-window -t 8
bind -T tab_mode 9 select-window -t 9
bind -T tab_mode Tab last-window
bind -T tab_mode s setw synchronize-panes


# ─── Resize 模式 (prefix + r → ...) ───────────────────────
# 对应 zellij: Ctrl-g → r → 方向键
# -r 标志: 在 repeat-time 内可重复按键 (模拟 zellij 停留在 resize 模式)

bind -T resize_mode -r h resize-pane -L 2
bind -T resize_mode -r j resize-pane -D 2
bind -T resize_mode -r k resize-pane -U 2
bind -T resize_mode -r l resize-pane -R 2
bind -T resize_mode -r H resize-pane -L 5
bind -T resize_mode -r J resize-pane -D 5
bind -T resize_mode -r K resize-pane -U 5
bind -T resize_mode -r L resize-pane -R 5


# ─── Move 模式 (prefix + m → ...) ─────────────────────────
# 对应 zellij: Ctrl-g → m → 方向键

bind -T move_mode h swap-pane -U
bind -T move_mode j swap-pane -D
bind -T move_mode k swap-pane -U
bind -T move_mode l swap-pane -D
bind -T move_mode n swap-pane -D
bind -T move_mode p swap-pane -U
bind -T move_mode Tab swap-pane -D


# ─── Session 模式 (prefix + o → ...) ──────────────────────
# 对应 zellij: Ctrl-g → o → 操作键

bind -T session_mode d detach-client
bind -T session_mode w choose-tree -Zs


# ─── Copy/Scroll 模式 (prefix + s 进入) ───────────────────
# 对应 zellij: Ctrl-g → s → scroll 模式
# vi 风格, j/k/d/u/Ctrl-b/Ctrl-f 为默认 vi copy-mode 行为

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel


# ============================================================
# 其他
# ============================================================

# 退出会话: prefix + q (对应 zellij Ctrl-q Quit)
bind q confirm-before -p "kill session? (y/n)" kill-session

# 重新加载配置: prefix + R
bind R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"


# ─── TPM 插件 ─────────────────────────────────────────────────

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'



# ─── 视觉 (Rose Pine 配色, 对应 zellij theme + simplified_ui) ──

set -g pane-border-lines single
set -g pane-border-style "fg=#6E6A86"
set -g pane-active-border-style "fg=#31748F"

set -g status-position bottom
set -g status-style "bg=#211E2E,fg=#E0DEF4"
set -g status-left "#[bg=#31748F,fg=#211E2E,bold] #S #[bg=#211E2E,fg=#31748F] "
set -g status-left-length 20
set -g status-right "#[fg=#9CCFD8,bold] %H:%M "
set -g window-status-format "#[fg=#6E6A86]  #I #W "
set -g window-status-current-format "#[bg=#31748F,fg=#211E2E,bold]  #I #W "
set -g message-style "bg=#211E2E,fg=#E0DEF4"
set -g mode-style "bg=#31748F,fg=#211E2E"


# ─── TPM 初始化 (保持在文件最末尾) ────────────────────────────

run '~/.config/thirdparty/tpm/tpm'
