# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio = [1, 3, 5]
sort_by = "mtime"
sort_sensitive = false
sort_reverse = true
sort_dir_first = true
sort_translit = false
linemode = "size"
show_hidden = true
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]

[preview]
wrap = "no"
tab_size = 2
max_width = 1920
max_height = 1080
cache_dir = ""
image_delay = 10
image_filter = "lanczos3"
image_quality = 90
# sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = '${EDITOR:-nvim} %s', desc = "$EDITOR", block = true, for = "unix" },
  { run = 'code %s', orphan = true, desc = "code", for = "windows" },
  { run = 'code -w %s', block = true, desc = "code (block)", for = "windows" },
]
open = [
  { run = 'xdg-open %s1', desc = "Open", for = "linux" },
  { run = 'open %s', desc = "Open", for = "macos" },
  { run = 'start "" %s1', orphan = true, desc = "Open", for = "windows" },
]
reveal = [
  { run = 'xdg-open %d1', desc = "Reveal", for = "linux" },
  { run = 'open -R %s1', desc = "Reveal", for = "macos" },
  { run = 'explorer /select,%s1', orphan = true, desc = "Reveal", for = "windows" },
]
# extract = [
#   { run = 'ya pub extract --list %s', desc = "Extract here" },
# ]
# Extract by ouch, depends on ouch(brew install ouch)
extract = [
  { run = 'ouch d -y %s', desc = "Extract here with ouch", for = "windows" },
  { run = 'ouch d -y %s', desc = "Extract here with ouch", for = "unix" },
]
open_with = [
  { run = '$SCRIPTS_HOME/open_with.sh "$@"', block = true, desc = "Open with...(fzf)", for = "macos" },
]
play = [
  { run = 'mpv --force-window %s', orphan = true, for = "unix" },
  { run = 'mpv --force-window %s', orphan = true, for = "windows" },
  { run = 'mediainfo %s1; echo "Press enter to exit"; read _', block = true, desc = "Show media info", for = "unix" },
]

[open]
rules = [
  # Folder
  { url = "*/", use = [
    "edit",
    "open",
    "reveal",
  ] },
  # Text
  { mime = "text/*", use = [
    "edit",
    "reveal",
  ] },
  # Image
  { mime = "image/*", use = [
    "open",
    "reveal",
  ] },
  # Media
  { mime = "{audio,video}/*", use = [
    "play",
    "reveal",
  ] },
  # Archive 压缩文件优先解压缩
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
    "extract",
    "reveal",
  ] },
  # JSON
  { mime = "application/{json,ndjson}", use = [
    "edit",
    "reveal",
  ] },
  { mime = "*/javascript", use = [
    "edit",
    "reveal",
  ] },
  # Empty file
  { mime = "inode/empty", use = [
    "edit",
    "reveal",
  ] },
  # 日志
  { url = "*.qqxlog", use = [
    "open",
    "reveal",
  ] },
  { url = "*.log", use = [
    "open",
    "reveal",
  ] },
  # Fallback
  { url = "*", use = [
    "edit",
    "open",
    "open_with",
    "reveal",
  ] },
]

[tasks]
bizarre_retry = 3
image_bound = [0, 0]
image_alloc = 1073741824 # 1024M
suppress_preload = false

[plugin]

prepend_fetchers = [
  { id = "git", url = "*", run = "git" },
  { id = "git", url = "*/", run = "git" },
  { id = "mime", url = "local://*", run = "mime-ext.local", prio = "high", if = "!mime" },
  { id = "mime", url = "remote://*", run = "mime-ext.remote", prio = "high", if = "!mime" },
]

fetchers = [
  # Mimetype
  { id = "mime", url = "*/",         run = "mime.dir",    prio = "high" },
  { id = "mime", url = "local://*",  run = "mime.local",  prio = "high" },
  { id = "mime", url = "remote://*", run = "mime.remote", prio = "high" },
]
spotters = [
  # WeChat Mini Program
  { url = "*.{wxml,wxss}", run = "code" },
  { url = "*/", run = "folder" },
  # Code
  { mime = "text/*", run = "code" },
  { mime = "*/{xml,javascript,wine-extension-ini}", run = "code" },
  # Fallback
  { url = "*", run = "file" },
]

prepend_preloaders = [
  { mime = "audio/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  { mime = "application/postscript", run = "mediainfo" },
]

preloaders = [
  # PDF
  { mime = "application/pdf", run = "pdf" },
  # Font
  { mime = "font/*", run = "font" },
  { mime = "application/ms-opentype", run = "font" },
]

prepend_previewers = [
  # WeChat Mini Program (wxml → HTML-like, wxss → CSS-like)
  { url = "*.{wxml,wxss}", run = "code" },
  # Markdown 用piper插件打开，不装其他插件了
  { url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
  # Media previewer MediaInfo (audio only)
  { mime = "audio/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  { mime = "application/postscript", run = "mediainfo" },
  # Archive previewer ouch
  { mime = "application/*zip", run = "ouch" },
  { mime = "application/x-tar", run = "ouch" },
  { mime = "application/x-bzip2", run = "ouch" },
  { mime = "application/x-7z-compressed", run = "ouch" },
  { mime = "application/x-rar", run = "ouch" },
  { mime = "application/vnd.rar", run = "ouch" },
  { mime = "application/x-xz", run = "ouch" },
  { mime = "application/xz", run = "ouch" },
  { mime = "application/x-zstd", run = "ouch" },
  { mime = "application/zstd", run = "ouch" },
  { mime = "application/java-archive", run = "ouch" },
  { url = "*.apk", run = "ouch" },
  # RichText previewer rich-preview
  { url = "*.csv", run = "rich-preview" },   # for csv files
  { url = "*.md", run = "rich-preview" },    # for markdown (.md) files
  { url = "*.rst", run = "rich-preview" },   # for restructured text (.rst) files
  { url = "*.ipynb", run = "rich-preview" }, # for jupyter notebooks (.ipynb)
  { url = "*.json", run = "rich-preview" },  # for json (.json) files
  { url = "*.xlsx", run = "rich-preview" },  # for xlsx (.xlsx) files
  #    { url = "*.lang_type", run = "rich-preview"} # for particular language files eg. .py, .go., .lua, etc.
]

previewers = [
  { url = "*/", run = "folder" },
  # Code
  { mime = "text/*", run = "code" },
  { mime = "*/{xml,javascript,wine-extension-ini}", run = "code" },
  # JSON
  { mime = "application/{json,ndjson}", run = "json" },
  # Image
  { mime = "image/{avif,hei?,jxl,svg+xml}", run = "magick" },
  { mime = "image/*", run = "image" },
  # Video
  { mime = "video/*", run = "video" },
  # PDF
  { mime = "application/pdf", run = "pdf" },
  # Archive
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
  { mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
  { url = "*.{AppImage,appimage}", run = "archive" },
  # Virtual Disk / Disk Image
  { mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
  { mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
  { url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
  # Font
  { mime = "font/*", run = "font" },
  { mime = "application/ms-opentype", run = "font" },
  # Empty file
  { mime = "inode/empty", run = "empty" },
]

append_previewers = [
  # hexyl as a fallback previewer to preview files
  { url = "*", run = "hexyl" },
]


[input]
cursor_blink = false

# cd
cd_title = "Change directory:"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

# create
create_title = ["Create:", "Create (dir):"]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

# rename
rename_title = "Rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

# filter
filter_title = "Filter:"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

# find
find_title = ["Find next:", "Find previous:"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

# search
search_title = "Search via {n}:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

# shell
shell_title = ["Shell:", "Shell (block):"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]

[confirm]
# trash
trash_title = "Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [0, 0, 70, 20]

# delete
delete_title = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [0, 0, 70, 20]

# overwrite
overwrite_title = "Overwrite file?"
overwrite_content = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [0, 0, 50, 15]

# quit
quit_title = "Quit?"
quit_content = "The following tasks are still running, are you sure you want to quit?"
quit_origin = "center"
quit_offset = [0, 0, 50, 15]

[pick]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by = "none"
sort_sensitive = false
sort_reverse = false
sort_translit = false
